name: Full translate (i18n PR + site docs PR)

on:
  workflow_call:
    inputs:
      source_lang:
        type: string
        default: fr_FR

      target_languages:
        type: string
        default: "en_US,de_DE,es_ES,it_IT,pt_PT"

      sync_site:
        type: boolean
        default: true

      site_repo:
        type: string
        default: "Zyg0m4t1k/Zyg0m4t1k.github.io"

      site_branch:
        type: string
        default: "master"

    secrets:
      SITE_PUSH_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: full-translate-${{ github.repository }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # i18n: Mips génère et ouvre la PR "translations" (sans DeepL)
      - name: Generate i18n (Mips) + open PR
        uses: Mips2648/plugins-translations@v2
        with:
          source_language: ${{ inputs.source_lang }}
          target_languages: ${{ inputs.target_languages }}

      - name: Site token precheck
        id: site_precheck
        if: ${{ inputs.sync_site }}
        shell: bash
        run: |
          if [ -z "${{ secrets.SITE_PUSH_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SITE_PUSH_TOKEN missing -> site sync will be skipped"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SITE_PUSH_TOKEN present -> site sync enabled"
          fi

      - name: Checkout site repo (for docs PR)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.site_repo }}
          ref: ${{ inputs.site_branch }}
          token: ${{ secrets.SITE_PUSH_TOKEN }}
          path: site
          fetch-depth: 0

      - name: Copy docs into site workspace
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e

          if [ ! -d "./docs" ]; then
            echo "No ./docs folder in plugin repo -> nothing to sync."
            exit 0
          fi

          PLUGIN_ID="${GITHUB_REPOSITORY#*/}"
          mkdir -p "site/docs/plugins/${PLUGIN_ID}"
          rsync -a --delete "./docs/" "site/docs/plugins/${PLUGIN_ID}/"

      - name: Copy plugin icon into site (smart fallback)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e

          PLUGIN_ID="${GITHUB_REPOSITORY#*/}"
          ICON_DIR="plugin_info"
          DEST_DIR="site/static/img/plugins"
          mkdir -p "${DEST_DIR}"

          ICON_SOURCE="${ICON_DIR}/${PLUGIN_ID}_icon.png"
          if [ ! -f "${ICON_SOURCE}" ]; then
            for ext in svg webp jpg jpeg; do
              if [ -f "${ICON_DIR}/${PLUGIN_ID}_icon.${ext}" ]; then
                ICON_SOURCE="${ICON_DIR}/${PLUGIN_ID}_icon.${ext}"
                break
              fi
            done
          fi

          if [ ! -f "${ICON_SOURCE}" ]; then
            ICON_SOURCE="$(find ${ICON_DIR} -maxdepth 1 -type f -name '*_icon.*' | head -n 1 || true)"
          fi

          if [ -z "${ICON_SOURCE}" ] || [ ! -f "${ICON_SOURCE}" ]; then
            echo "No icon found in ${ICON_DIR} -> skipping"
            exit 0
          fi

          cp -f "${ICON_SOURCE}" "${DEST_DIR}/$(basename "${ICON_SOURCE}")"

      - name: Create PR on site repo (docs sync)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SITE_PUSH_TOKEN }}
          path: site
          commit-message: "docs(${{ github.event.repository.name }}): sync from plugin"
          title: "docs(${{ github.event.repository.name }}): sync from plugin"
          branch: "bot/docs-${{ github.event.repository.name }}"
          base: ${{ inputs.site_branch }}
          delete-branch: true

      - name: Skip site sync (info)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled != 'true' }}
        run: echo "Site sync skipped (sync_site=true but SITE_PUSH_TOKEN missing in this run)"
