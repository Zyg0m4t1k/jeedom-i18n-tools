name: Full translate (i18n + site docs + icon sync) — NO PR (push direct)

on:
  workflow_call:
    inputs:
      source_lang:
        type: string
        default: "fr_FR"
      target_languages:
        type: string
        default: "en_US,de_DE,es_ES,it_IT,pt_PT"
      sync_site:
        type: boolean
        default: true
      site_repo:
        type: string
        default: "Zyg0m4t1k/Zyg0m4t1k.github.io"
      site_branch:
        type: string
        default: "master"
    secrets:
      SITE_PUSH_TOKEN:
        required: false

permissions:
  contents: write

concurrency:
  group: full-translate-${{ github.repository }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout du repo plugin (celui qui appelle ce workflow)
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Génère / met à jour les JSON i18n (sans DeepL)
      - name: Generate/Update i18n (Jeedom JSON)
        uses: Mips2648/plugins-translations@v2
        with:
          source_language: ${{ inputs.source_lang }}
          target_languages: ${{ inputs.target_languages }}

      # 3) Commit & push direct dans la branche courante (ex: beta)
      - name: Commit & push i18n changes (no PR)
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No i18n changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "chore(i18n): update translations"

          BRANCH="${GITHUB_REF_NAME}"
          echo "Pushing to plugin branch: ${BRANCH}"
          git push origin "HEAD:${BRANCH}"

      # 4) Vérifie si on peut sync le site (token présent)
      - name: Site token precheck
        id: site_precheck
        if: ${{ inputs.sync_site }}
        shell: bash
        run: |
          if [ -z "${{ secrets.SITE_PUSH_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SITE_PUSH_TOKEN missing -> site sync will be skipped"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SITE_PUSH_TOKEN present -> site sync enabled"
          fi

      # 5) Checkout du repo site dans ./site
      - name: Checkout site repo
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.site_repo }}
          ref: ${{ inputs.site_branch }}
          token: ${{ secrets.SITE_PUSH_TOKEN }}
          path: site
          fetch-depth: 0

      # 6) Copie des docs du plugin vers le site
      - name: Copy docs into site workspace
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e

          if [ ! -d "./docs" ]; then
            echo "No ./docs folder in plugin repo -> nothing to sync."
            exit 0
          fi

          PLUGIN_ID="${GITHUB_REPOSITORY#*/}"
          echo "PLUGIN_ID=${PLUGIN_ID}"

          mkdir -p "site/docs/plugins/${PLUGIN_ID}"
          rsync -a --delete "./docs/" "site/docs/plugins/${PLUGIN_ID}/"

      # 6bis) Copie de l'icône du plugin vers le site (fallback intelligent)
      - name: Copy plugin icon into site (smart fallback)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e

          PLUGIN_ID="${GITHUB_REPOSITORY#*/}"
          ICON_DIR="plugin_info"
          DEST_DIR="site/static/img/plugins"

          mkdir -p "${DEST_DIR}"

          # 1️⃣ priorité : <repo>_icon.png
          ICON_SOURCE="${ICON_DIR}/${PLUGIN_ID}_icon.png"

          if [ ! -f "${ICON_SOURCE}" ]; then
            # 2️⃣ autres extensions avec même nom
            for ext in svg webp jpg jpeg; do
              if [ -f "${ICON_DIR}/${PLUGIN_ID}_icon.${ext}" ]; then
                ICON_SOURCE="${ICON_DIR}/${PLUGIN_ID}_icon.${ext}"
                break
              fi
            done
          fi

          if [ ! -f "${ICON_SOURCE}" ]; then
            # 3️⃣ fallback : n'importe quel *_icon.*
            ICON_SOURCE="$(find ${ICON_DIR} -maxdepth 1 -type f -name '*_icon.*' | head -n 1 || true)"
          fi

          if [ -z "${ICON_SOURCE}" ] || [ ! -f "${ICON_SOURCE}" ]; then
            echo "No icon found in ${ICON_DIR} -> skipping"
            exit 0
          fi

          ICON_FILENAME="$(basename "${ICON_SOURCE}")"
          ICON_DEST="${DEST_DIR}/${ICON_FILENAME}"

          echo "Copying icon ${ICON_SOURCE} -> ${ICON_DEST}"
          cp -f "${ICON_SOURCE}" "${ICON_DEST}"

      # 7) Commit & push direct dans la branche du site (ex: master)
      - name: Commit & push site docs/icon sync (no PR)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -e
          cd site

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No site changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "docs(${{ github.event.repository.name }}): sync from plugin"

          echo "Pushing to site branch: ${{ inputs.site_branch }}"
          git push origin "HEAD:${{ inputs.site_branch }}"

      - name: Skip site sync (info)
        if: ${{ inputs.sync_site && steps.site_precheck.outputs.enabled != 'true' }}
        run: echo "Site sync skipped (sync_site=true but SITE_PUSH_TOKEN missing in this run)"
